version: "3.9"

services:
  paradedb:
    image: paradedb/paradedb:0.22.3-pg17
    container_name: paradedb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - paradedb_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  reranker:
    build: ./reranker
    container_name: reranker
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  mock-jenkins:
    build: ./mock-jenkins
    container_name: mock-jenkins
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8080/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./app
    container_name: app
    ports:
      - "3000:3000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: postgresql://postgres:postgres@paradedb:5432/ragdb
      RERANKER_URL: http://reranker:8000
      JENKINS_URL: http://mock-jenkins:8080
      JENKINS_USER: ${JENKINS_USER:-dev}
      JENKINS_TOKEN: ${JENKINS_TOKEN:-dev-token}
    depends_on:
      paradedb:
        condition: service_healthy
      reranker:
        condition: service_healthy
      mock-jenkins:
        condition: service_healthy

  ingestion:
    build: ./ingestion
    container_name: ingestion
    profiles: ["ingest"]
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: postgresql://postgres:postgres@paradedb:5432/ragdb
      DATA_DIR: /data
    volumes:
      - ./data:/data
    depends_on:
      paradedb:
        condition: service_healthy

  scraper:
    build: ./scraper
    container_name: scraper
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: postgresql://postgres:postgres@paradedb:5432/ragdb
      CONFLUENCE_URL: http://mock-apis:8081
      JIRA_URL: http://mock-apis:8081
      DATA_DIR: /data
    volumes:
      - ./data:/data
      - ./scraper:/app
    working_dir: /app
    command: ["python", "scraper.py", "--loop"]
    depends_on:
      paradedb:
        condition: service_healthy
      mock-apis:
        condition: service_healthy

  mock-apis:
    build: ./mock-apis
    container_name: mock-apis
    ports:
      - "8081:8081"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8081/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_BASIC_ENABLED: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/feedback.json
      GF_LOG_LEVEL: warn
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      paradedb:
        condition: service_healthy

volumes:
  paradedb_data:
  grafana_data:
