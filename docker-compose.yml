version: "3.9"

services:
  paradedb:
    image: paradedb/paradedb:0.22.3-pg17
    container_name: paradedb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - paradedb_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  reranker:
    build: ./reranker
    container_name: reranker
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  mock-jenkins:
    build: ./mock-jenkins
    container_name: mock-jenkins
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./app
    container_name: app
    ports:
      - "3000:3000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: postgresql://postgres:postgres@paradedb:5432/ragdb
      RERANKER_URL: http://reranker:8000
      JENKINS_URL: http://mock-jenkins:8080
      JENKINS_USER: ${JENKINS_USER:-dev}
      JENKINS_TOKEN: ${JENKINS_TOKEN:-dev-token}
    depends_on:
      paradedb:
        condition: service_healthy
      reranker:
        condition: service_healthy
      mock-jenkins:
        condition: service_healthy

  ingestion:
    build: ./ingestion
    container_name: ingestion
    profiles: ["ingest"]
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: postgresql://postgres:postgres@paradedb:5432/ragdb
    volumes:
      - ./data:/data:ro
    depends_on:
      paradedb:
        condition: service_healthy

volumes:
  paradedb_data:
